  <body data-theme="default" onload="setup()">
    <header class="main-header js-main-header">
      <!-- <div class="logo-wrapper js-logo-wrapper">
        <a href="#0" class="logo"> <img src="assets/img/dummy-logo.svg" alt="Logo"> </a>
      </div> -->
      <div></div>
      <div class="top-nav js-top-nav">
        <ul class="nav__list js-nav__list" id="guest-links">
          <li class="nav__item js-nav__login"><a class="js-modal-trigger" href="#0" data-signin="login">Beam in</a> </li>
          <li class="nav__item js-nav__login"><a class="js-modal-trigger" href="#0" data-signin="signup">Sign up</a>
          </li>
        </ul>
        <div class="nav__item nav__item--account" data-display="loggedIn">
          <a href="#0" onclick="accountDropdown()">
            <img class="avatar" src="assets/img/loggedout.png">
          </a>
          <ul class="nav__sub-list">
            <li class="nav__sub-item"><p id="username">dummy username</p></li>
            <li class="nav__sub-item"><a class="nav__sub-link nav__sub-link--glow" href="#0" onclick="return openAvatarModal('view')">View Avatar Details</a></li>
            <li class="nav__sub-item"><a class="nav__sub-link nav__sub-link--glow" href="#0" onclick="return openAvatarModal('edit')">Edit Avatar Details</a></li>
            <li class="nav__sub-item"><a class="nav__sub-link nav__sub-link--glow" href="#0" onclick="onLogout()">Beam Out</a></li>
          </ul>
        </div>
        <div style="cursor: pointer;" class="nav__item"><button class="reset nav-trigger js-nav-trigger"
            aria-label="Toggle menu"><span></span></button>
        </div>
      </div>
      <script type="text/javascript">
        function setup() {
          var user;
          const avatarRaw = localStorage.getItem('avatar');
          if (avatarRaw && avatarRaw !== 'undefined') {
              user = JSON.parse(avatarRaw);
          }
          
          var loginDiv = document.querySelector('[data-display="loggedIn"]')
          var avatarDiv = document.querySelector('.nav__item--account')
          var icon = document.getElementsByClassName('avatar')[0]

          /*if logged in, hide guest links*/
          if (localStorage.getItem('loggedIn') === "true") 
          {
            var guest_links = document.getElementById('guest-links');
            var username = document.getElementById("username");
            guest_links.style.display = "none";
            avatarDiv.classList.add('loggedin');
            
            if (user && user.username) {           // ← guard here
                username.innerHTML = user.username;
            }
            icon.src = 'assets/img/loggedin.png';
          }

          /* Do not show drop down*/
          else{
            // loginDiv.style.display = 'none'
            if (avatarDiv.classList.contains('loggedin')) {
              avatarDiv.classList.remove('loggedin')
            }
           icon.src='assets/img/loggedout.png' 
          }
        }
        setup()

        function goToAvatar(event) {
          if (event) event.preventDefault();
          if (localStorage.getItem('loggedIn') === "true") {
            window.location.href = event && event.currentTarget ? event.currentTarget.getAttribute('data-avatar-route') : '/avatar/';
            return;
          }
          showCheckAPIMessage();
        }

        function showMenuMessage(title, message) {
          var panel = document.getElementById('menu-message');
          if (!panel) return;

          panel.innerHTML = '<h3>' + title + '</h3><p>' + message + '</p>';
          panel.hidden = false;
          panel.classList.add('menu-message--show');

          clearTimeout(window.__menuMessageTimer);
          window.__menuMessageTimer = setTimeout(function () {
            panel.classList.remove('menu-message--show');
            panel.hidden = true;
          }, 2800);
        }

        function showCheckAPIMessage() {
          if (localStorage.getItem('loggedIn') === "true") {
            showMenuMessage('Check API', 'This area is available after sign in. Select a linked action from the menu to continue.');
          } else {
            showMenuMessage('Sign in required', 'Please beam in first to use this area.');
          }
        }

        function showComingSoonMessage() {
          showMenuMessage('Coming soon', 'This feature is planned for a future update.');
        }

        function showSTARMessage() {
          showMenuMessage('STAR / OApp tools', 'These developer tools are part of the WEB5 STAR stack and will be opened from the Developer menu.');
        }

        function showOurWorldMessage() {
          showMenuMessage('Our World', 'This section is tied to the Our World / map experience and will open there when the flow is ready.');
        }
      </script>
