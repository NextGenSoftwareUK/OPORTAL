<div class="modal__block js-modal-block subscription-modal-block" data-type="subscription" id="subscription-modal-block">
  <section class="map-modal-shell" aria-label="Subscription">
    <div class="map-modal-card">

      <div class="map-modal-top">
        <div>
          <h1 class="map-modal-title">Subscription</h1>
          <p class="map-modal-lead">Manage your OASIS subscription plans, orders and HyperDrive usage.</p>
        </div>
        <button id="subscription-close-btn" class="modal-close-btn" type="button" aria-label="Close">&#x2715;</button>
      </div>

      <div class="map-stats-bar" style="grid-template-columns:repeat(3,1fr)">
        <div class="map-stat-block">
          <div class="map-stat-label">Active Plan</div>
          <div class="map-stat-value" id="sub-stat-plan">—</div>
        </div>
        <div class="map-stat-block">
          <div class="map-stat-label">HyperDrive Used</div>
          <div class="map-stat-value" id="sub-stat-hd-used">—</div>
        </div>
        <div class="map-stat-block">
          <div class="map-stat-label">HyperDrive Limit</div>
          <div class="map-stat-value" id="sub-stat-hd-limit">—</div>
        </div>
      </div>

      <div id="subscription-status" class="subscription-status" hidden></div>

      <div class="map-tabs">
        <button class="map-tab is-active" data-tab="plans">Plans</button>
        <button class="map-tab" data-tab="mysubs">My Subscriptions</button>
        <button class="map-tab" data-tab="usage">Usage</button>
        <button class="map-tab" data-tab="orders">Orders</button>
      </div>

      <div id="sub-tab-plans" class="map-tab-panel">
        <div id="sub-plans-list" class="modal-item-list">
          <div class="map-empty"><p>Loading plans…</p></div>
        </div>
      </div>

      <div id="sub-tab-mysubs" class="map-tab-panel" hidden>
        <div id="sub-mysubs-list" class="modal-item-list">
          <div class="map-empty"><p>Loading subscriptions…</p></div>
        </div>
      </div>

      <div id="sub-tab-usage" class="map-tab-panel" hidden>
        <div id="sub-usage-panel" class="modal-detail-panel">
          <div class="map-empty"><p>Loading usage stats…</p></div>
        </div>
      </div>

      <div id="sub-tab-orders" class="map-tab-panel" hidden>
        <div id="sub-orders-list" class="modal-item-list">
          <div class="map-empty"><p>Loading orders…</p></div>
        </div>
      </div>

    </div>
  </section>
</div>
