<div class="modal__block js-modal-block gifts-modal-block" data-type="gifts" id="gifts-modal-block">
  <section class="map-modal-shell" aria-label="Gifts">
    <div class="map-modal-card">

      <div class="map-modal-top">
        <div>
          <h1 class="map-modal-title">Gifts</h1>
          <p class="map-modal-lead">Send and receive gifts with other OASIS avatars.</p>
        </div>
        <button id="gifts-close-btn" class="modal-close-btn" type="button" aria-label="Close">&#x2715;</button>
      </div>

      <div class="map-stats-bar" style="grid-template-columns:repeat(3,1fr)">
        <div class="map-stat-block">
          <div class="map-stat-label">Pending Gifts</div>
          <div class="map-stat-value" id="gifts-stat-pending">—</div>
        </div>
        <div class="map-stat-block">
          <div class="map-stat-label">Sent</div>
          <div class="map-stat-value" id="gifts-stat-sent">—</div>
        </div>
        <div class="map-stat-block">
          <div class="map-stat-label">Received</div>
          <div class="map-stat-value" id="gifts-stat-received">—</div>
        </div>
      </div>

      <div id="gifts-status" class="gifts-status" hidden></div>

      <div class="map-tabs">
        <button class="map-tab is-active" data-tab="inbox">My Gifts</button>
        <button class="map-tab" data-tab="send">Send Gift</button>
        <button class="map-tab" data-tab="history">History</button>
      </div>

      <!-- My Gifts inbox -->
      <div id="gifts-tab-inbox" class="map-tab-panel">
        <div class="modal-toolbar">
          <button id="gifts-refresh-btn" class="button button--ghost" type="button" style="font-size:0.85rem;padding:5px 14px;">⟳ Refresh</button>
        </div>
        <div id="gifts-inbox-list" class="modal-item-list">
          <div class="map-empty"><div class="map-empty-icon">🎁</div><p>Loading gifts…</p></div>
        </div>
      </div>

      <!-- Send -->
      <div id="gifts-tab-send" class="map-tab-panel" hidden>
        <div class="modal-form">
          <div class="modal-form-group">
            <label class="modal-label" for="gifts-to-id">Recipient Avatar ID</label>
            <input id="gifts-to-id" type="text" class="modal-input" placeholder="Enter avatar ID…" />
          </div>
          <div class="modal-form-group">
            <label class="modal-label" for="gifts-message">Message (optional)</label>
            <textarea id="gifts-message" class="modal-input modal-textarea" rows="3" placeholder="A personal message…"></textarea>
          </div>
          <div class="modal-form-group">
            <label class="modal-label" for="gifts-item-id">Item / Holon ID (optional)</label>
            <input id="gifts-item-id" type="text" class="modal-input" placeholder="Leave blank for a message gift" />
          </div>
          <button id="gifts-send-btn" class="button button--primary" type="button">Send Gift</button>
        </div>
      </div>

      <!-- History -->
      <div id="gifts-tab-history" class="map-tab-panel" hidden>
        <div id="gifts-history-list" class="modal-item-list">
          <div class="map-empty"><p>Loading gift history…</p></div>
        </div>
      </div>

    </div>
  </section>
</div>
